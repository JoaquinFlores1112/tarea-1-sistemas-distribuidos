services:
  cache-redis:
    image: redis:latest
    ports:
      - "6379:6379"
    # aca debo modificar la memoria y la politica para los calculos de la tarea
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru

  response-gen:
    build: ./response-gen
    ports:
      - "5000:5000"

  traffic-gen:
    build: ./traffic-gen
    depends_on:
      - response-gen
      - cache-redis
    volumes:
      - ./traffic-gen:/app